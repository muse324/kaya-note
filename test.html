<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>かやのおと - display</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            /* ensure no scrollbars in kiosk */
            background: black;
        }
    </style>
</head>

<body>
    <script>

        let texts = [];
        let mode = "intro";
        let introStartTime = 0;
        let mainStartTime = 0;
        let firstMainTextTime = 0;
        let audioCtx = null;
        let introSoundPlayed = false;
        let masterComp = null;

        const CONFIG = {
            maxTexts: 40,               // 上限（安定運用）
            autoIntervalMs: 4000,       // サンプル出現間隔（ミリ秒）
            replayIntervalMs: 6000,     // ログ再生間隔（ミリ秒）
            startupAutoDelayMs: 2000,   // 起動直後の自動生成遅延
            startupReplayDelayMs: 5000, // 起動直後の記憶再生遅延
            lifeMin: 360,               // 寿命下限（フレーム）
            lifeMax: 720                // 寿命上限（フレーム）
            ,
            intro: {
                xCenter: 0.5,
                yCenter: 0.38,
                jitterX: 20,
                jitterY: 15,
                sizeScale: 0.75,
                maxLines: 12
            }
        };

        const AUDIO_CONFIG = {
            mode: "A", // "A" = chord, "B" = arpeggio
            chordSize: [3, 4],
            arpeggioCount: [6, 12],
            baseFreq: 220,
            spread: 24 // semitone range
        };
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();

                // master compressor to prevent clipping
                masterComp = audioCtx.createDynamicsCompressor();
                masterComp.threshold.value = -24;
                masterComp.knee.value = 30;
                masterComp.ratio.value = 4;
                masterComp.attack.value = 0.003;
                masterComp.release.value = 0.25;

                masterComp.connect(audioCtx.destination);
            }
        }

        function midiToFreq(m) {
            return 440 * Math.pow(2, (m - 69) / 12);
        }

        function playTone(freq, startTime, duration = 1.2) {
            let osc1 = audioCtx.createOscillator();
            let osc2 = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            let oscGain = audioCtx.createGain();
            oscGain.gain.value = 0.5; // reduce combined amplitude

            // fundamental
            osc1.type = "triangle";
            osc1.frequency.value = freq;

            // upper partial (slightly detuned for richness)
            osc2.type = "sine";
            osc2.frequency.value = freq * 2;
            osc2.detune.value = random(-8, 8);

            // envelope (less clicky, more natural decay)
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(0.2, startTime + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

            osc1.connect(oscGain);
            osc2.connect(oscGain);
            oscGain.connect(gain);

            if (masterComp) {
                gain.connect(masterComp);
            } else {
                gain.connect(audioCtx.destination);
            }

            osc1.start(startTime);
            osc2.start(startTime);
            osc1.stop(startTime + duration);
            osc2.stop(startTime + duration);
        }

        function playIntroSound() {
            if (!audioCtx) return;

            let now = audioCtx.currentTime;
            let mode = random() < 0.8 ? "A" : "B";
            if (mode === "A") {
                // chord (wide range, avoid minor 2nd)
                let count = floor(random(AUDIO_CONFIG.chordSize[0], AUDIO_CONFIG.chordSize[1] + 1));

                let notes = [];
                let attempts = 0;

                while (notes.length < count && attempts < 50) {
                    let midi = 84 + floor(random(-36, 18)); // wider spread (~3 octaves total span)

                    let ok = true;
                    for (let n of notes) {
                        if (abs(n - midi) <= 1) {
                            ok = false; // avoid semitone (minor 2nd)
                            break;
                        }
                    }

                    if (ok) {
                        notes.push(midi);
                    }

                    attempts++;
                }

                for (let i = 0; i < notes.length; i++) {
                    // slight temporal spread for piano feel
                    playTone(midiToFreq(notes[i]), now + i * 0.01, 2.6);
                }
            } else {
                // arpeggio (directional)
                let count = floor(random(AUDIO_CONFIG.arpeggioCount[0], AUDIO_CONFIG.arpeggioCount[1] + 1)) + 5;

                let direction = random() < 0.5 ? 1 : -1;
                let base = 84 + floor(random(-4, 4));

                let times = [];
                let tAccum = 0;

                for (let i = 0; i < count; i++) {
                    let phase = i / count;

                    // accelerando → ritardando (stronger contrast)
                    let interval;
                    if (phase < 0.5) {
                        // stronger accelerando
                        let t = phase * 2;
                        interval = lerp(0.20, 0.07, pow(t, 1.5));
                    } else {
                        // stronger ritardando
                        let t = (phase - 0.5) * 2;
                        interval = lerp(0.07, 0.20, pow(t, 1.1));
                    }

                    tAccum += interval;
                    times.push(tAccum);
                }

                for (let i = 0; i < count; i++) {
                    let step = floor(random(1, 3));
                    let midi = base + direction * i * step;
                    playTone(midiToFreq(midi), now + times[i], 1.2);
                }
            }
        }

        let lastAutoTime = 0;
        let lastReplayTime = 0;

let inputHistory = [];

let loadedKeys = new Set();

        // Googleスプレッドシートからテキストデータを読み込む
        async function loadTextsFromGoogleSheet() {
            // 公開されたGoogleスプレッドシートのCSV URLを指定
            // スプレッドシートの「ファイル→ウェブに公開」で取得したCSVのURLを指定してください
            // gidパラメータはシートごとに異なりますが省略も可
            const url = "https://docs.google.com/spreadsheets/d/1l2Ebe6o6l3irnh01hgDWIVw3pPY9cH71jOD7nArO-oE/pub?output=csv";

            try {
                const res = await fetch(url);
                const text = await res.text();

                // if HTML is returned instead of CSV (wrong URL), ignore
                if (text.startsWith("<!DOCTYPE html")) {
                    console.error("CSVではなくHTMLが返っています。URLを確認してください");
                    return;
                }

                // CSVを1行ずつ分解
                const rows = text.split("\n");

                rows.forEach((row, index) => {
                    if (index === 0) return;

                    const cols = row.split(",");
                    if (cols.length < 2) return;

                    let timestamp = cols[0];
                    let str = cols[1].trim();
                    if (!str) return;

                    let key = timestamp + "_" + str;
                    if (loadedKeys.has(key)) return;
                    loadedKeys.add(key);

                    inputHistory.push({
                        text: str,
                        time: millis(),
                        weight: parseInt(cols[2]) || 1
                    });

                    // immediate display
                    let processed = poeticTransform(str);
                    texts.push(new FloatingText(processed, "#ffffcc", null, 1));
                });

                console.log("Loaded texts from Google Sheets:", inputHistory.length);
            } catch (e) {
                console.error("Failed to load Google Sheets data:", e);
            }
        }
        let sampleWords = [
            "だれかがいる",
            "ここではないどこか",
            "ほどけていくことば",
            "きこえないこえ",
            "すぐそばの遠さ",
            "わたしの外側",
            "あなたの内側",
            "触れないまま触れている",
            "ひかりがほどける",
            "名前を持たない音",
            "気配だけが残る",
            "通り過ぎていく記憶",
            "まだ言葉にならない",
            "こぼれたままの意味",
            "どこにも届かない声",
            "ここにいるようでいない",
            "わたしは外にいる",
            "内側に触れない",
            "ゆらぎ続ける境界",
            "見えているのに遠い",
            "重ならない距離",
            "誰のものでもない言葉",
            "ここで消えていく",
            "触れたはずの気配",
            "なにも言っていないのに",
            "ただ漂っている",
            "ひとつ前のわたし",
            "遅れて届く声",
            "空気のような記憶",
            "境界だけがある",
            "消えきらない残響",
            "言葉の手前で止まる",
            "誰にも届かないまま",
            "ここにあるはずのもの",
            "通り抜けていく気配",
            "ここにいるのにここではない",
            "ことばになる前に消えていく",
            "あなたに届かないまま残る",
            "触れた気がして触れていない",
            "遠くにあるはずの近さ",
            "見えているのに掴めない",
            "わたしの外にわたしがいる",
            "声にならないまま響く",
            "すれ違ったまま重ならない",
            "ここで終わるはずだった言葉"
        ];
        // --- text transformation ---
        function poeticTransform(str) {

            // 全角スペース正規化
            str = str.trim();

            // ランダムに複数の処理を適用
            let r = random();

            if (r < 0.15) {
                return splitPhrase(str);
            } else if (r < 0.25) {
                return cutEnding(str);
            } else if (r < 0.75) {
                return repeatFragment(str);
            } else {
                return insertPause(str);
            }
        }
        function memoryTransform(str) {
            // stronger degradation for memory
            let s = str;
            if (random() < 0.7 && s.length > 2) {
                s = cutEnding(s);
            }
            if (random() < 0.4 && s.length > 3) {
                s = splitPhrase(s);
            }
            return s;
        }
        function cutEnding(str) {
            if (str.length <= 2) return str;
            let cut = floor(random(1, str.length / 2));
            return str.substring(0, str.length - cut);
        }
        function splitPhrase(str) {
            if (str.length <= 3) return str;

            // 日本語の不自然な分断を避けるため、句読点やスペースでのみ分割
            let candidates = [];

            for (let i = 1; i < str.length - 1; i++) {
                let ch = str[i];
                if (ch === "、" || ch === "。" || ch === " " || ch === "　") {
                    candidates.push(i);
                }
            }

            if (candidates.length === 0) {
                return str; // 分割しない
            }

            let splitPoint = random(candidates);

            return str.substring(0, splitPoint) + "\n" + str.substring(splitPoint);
        }
        function repeatFragment(str) {
            if (str.length <= 2) return str;

            let start = floor(random(0, str.length - 1));
            let end = start + floor(random(1, 3));

            let fragment = str.substring(start, end);

            return str + "\n" + fragment;
        }
        function insertPause(str) {
            if (str.length <= 2) return str;

            let pos = floor(random(1, str.length - 1));

            return str.substring(0, pos) + "　" + str.substring(pos);
        }
        function pickColorByDepth(depth) {
            let c = lerpColor(color(255, 255, 255), color(200, 220, 255), depth * 0.8);
            return c;
        }
        // --- rendering class ---
        class FloatingText {
            constructor(str, col = null, depthOverride = null, weight = 1) {
                this.str = str;

                // decide layout: vertical (default) or horizontal (rare or strong memory)
                this.isHorizontal = false;
                if (random() < 0.15) this.isHorizontal = true;

                if (weight > 2 && random() < 0.5) {
                    this.isHorizontal = true;
                }

                // 奥行き（0:手前〜1:奥）
                this.depth = (depthOverride !== null)
                    ? depthOverride
                    : pow(random(), 1.5); // 手前寄りを少し増やす

                // concentrate around central vertical band (kaya surface)
                this.x = width * random(0.3, 0.7);
                this.y = random(height * map(this.depth, 0, 1, 1.0, 0.6));

                if (mode === "intro") {
                    this.x = width * CONFIG.intro.xCenter + random(-CONFIG.intro.jitterX, CONFIG.intro.jitterX);
                    this.y = height * CONFIG.intro.yCenter + random(-CONFIG.intro.jitterY, CONFIG.intro.jitterY);
                }

                this.birth = millis();
                this.maxLifeMs = random(CONFIG.lifeMin, CONFIG.lifeMax) * (1000 / 60);
                this.maxLifeMs *= map(this.depth, 0, 1, 1.0, 1.6); // deeper = longer

                // サイズ（手前ほど大きい）
                this.size = map(this.depth, 0, 1, 60, 20);

                // intro: slightly smaller and constrained size
                if (mode === "intro") {
                    this.size *= CONFIG.intro.sizeScale;
                }

                // 速度（手前ほど速い）
                this.vy = map(this.depth, 0, 1, -0.6, -0.1);

                // 横揺れ（奥はほぼ動かない）
                this.vx = map(this.depth, 0, 1, 0.15, 0.02) * random([-1, 1]);

                // ▼ 色
                if (col) {
                    this.col = col;
                } else {
                    this.col = pickColorByDepth(this.depth);
                }
                this.baseCol = color(this.col);

                // intro sound trigger (only once, when first text appears)
                if (mode === "intro" && !introSoundPlayed) {
                    if (audioCtx && audioCtx.state === "running") {
                        playIntroSound();
                        introSoundPlayed = true;
                    }
                }
            }

            update() {
                // time-based; no frame counter needed
                this.y += this.vy;
                this.x += this.vx;

                // deeper texts drift less and stabilize horizontally
                if (this.depth > 0.7) {
                    this.vx *= 0.98;
                }

                if (mode === "intro") {
                    this.vx *= 0.3;
                    this.vy *= 0.3;
                }

                let ageMs = millis() - this.birth;
                if (ageMs > this.maxLifeMs - 2000) {
                    // gradually move deeper before disappearing
                    this.depth += 0.002;
                    this.depth = constrain(this.depth, 0, 1);
                }
            }

            draw() {
                let ageMs = millis() - this.birth;
                let alpha;

                let fadeInMs = 1000;   // 1s
                let fadeOutMs = 2000;  // 2s

                if (ageMs < fadeInMs) {
                    let t = constrain(ageMs / fadeInMs, 0, 1);
                    alpha = pow(t, 2) * 255; // ease-in
                } else if (ageMs > this.maxLifeMs - fadeOutMs) {
                    let t = constrain((this.maxLifeMs - ageMs) / fadeOutMs, 0, 1);
                    alpha = pow(t, 1.5) * 255; // smooth fade-out
                } else {
                    alpha = 255;
                }

                // 奥ほど薄く (stronger fade)
                alpha *= pow(map(this.depth, 0, 1, 1.0, 0.4), 1.2);

                // layer breathing effect (same depth moves together)
                let phase = sin(millis() * 0.0003 + this.depth * 6);
                let breath = map(phase, -1, 1, 0.85, 1.15);
                alpha *= breath;

                drawingContext.shadowBlur = map(this.depth, 0, 1, 0, 12);
                drawingContext.shadowColor = "rgba(255,255,255,0.8)";

                let c = lerpColor(this.baseCol, color(255), this.depth * 0.6);
                c.setAlpha(alpha);
                fill(c);
                textSize(this.size);

                // dynamic weight: front = slightly bolder
                if (this.depth < 0.3) {
                    textStyle(BOLD);
                } else {
                    textStyle(NORMAL);
                }

                if (mode === "intro") {
                    // tighter constraint for visual stability
                    this.x = constrain(this.x, width * 0.3, width * 0.7);
                    this.y = constrain(this.y, height * 0.25, height * 0.6);
                }
                // 縦書き or 横書き
                if (this.isHorizontal) {
                    text(this.str, this.x, this.y);
                } else {
                    let chars = this.str.split("");

                    // limit vertical lines to avoid overflow
                    let maxLines = 12;
                    if (mode === "intro") maxLines = CONFIG.intro.maxLines;

                    if (chars.length > maxLines) {
                        chars = chars.slice(0, maxLines);
                    }

                    let lineHeight = this.size * 1.0;

                    for (let i = 0; i < chars.length; i++) {
                        // per-character fade variation
                        let charAlpha = alpha * map(i, 0, chars.length, 1.0, 0.6);

                        let cc = color(red(c), green(c), blue(c), charAlpha);
                        fill(cc);

                        text(chars[i], this.x, this.y + i * lineHeight);
                    }
                }
                drawingContext.shadowBlur = 0;
            }

            isDead() {
                return (millis() - this.birth) > this.maxLifeMs;
            }
        }

        // --- p5 lifecycle ---
        function setup() {
            let c = createCanvas(windowWidth, windowHeight);
            c.parent(document.body);
            textAlign(CENTER, CENTER);
            textFont("Noto Sans JP");
            textStyle(NORMAL);

            // intro: start with a single text
            let word;
            let depth = 0.3;
            let isFromHistory = inputHistory.length > 0 && random() < 0.7;

            if (isFromHistory) {
                let log = random(inputHistory);
                word = log.text; // no transform (raw trace)
                let ageNorm = constrain((millis() - log.time) / 30000, 0, 1);
                depth = constrain(pow(ageNorm, 1.2), 0.2, 0.6);
            } else {
                word = random(sampleWords);
            }

            texts.push(new FloatingText(word, "#ffffff", depth, 1));
            introStartTime = millis();
            lastAutoTime = millis() - (CONFIG.autoIntervalMs - CONFIG.startupAutoDelayMs);
            lastReplayTime = millis() - (CONFIG.replayIntervalMs - CONFIG.startupReplayDelayMs);

            initAudio();
            loadTextsFromGoogleSheet();
            setInterval(loadTextsFromGoogleSheet, 3000);
        }

        function draw() {
            background(0);


            // intro phase control
            if (mode === "intro") {
                let elapsed = millis() - introStartTime;

                // wait until intro text fully fades out
                if (texts.length === 0 && elapsed > 3000) {
                    mode = "main";
                    mainStartTime = millis();
                    firstMainTextTime = 0;
                    lastAutoTime = millis();
                    lastReplayTime = millis();
                }
            }

            texts.sort((a, b) => b.depth - a.depth);

            // テキスト更新
            for (let i = texts.length - 1; i >= 0; i--) {
                texts[i].update();
                texts[i].draw();

                if (texts[i].isDead()) {
                    texts.splice(i, 1);
                }
            }

            if (texts.length > CONFIG.maxTexts) {
                texts.splice(0, texts.length - CONFIG.maxTexts);
            }

            let now = millis();

            if (mode === "main") {
                if (now - lastAutoTime > CONFIG.autoIntervalMs) {
                    addRandomText();
                    lastAutoTime = now;
                }

                if (now - lastReplayTime > CONFIG.replayIntervalMs) {
                    replayFromLog();
                    lastReplayTime = now;
                }
            }

            // --- overlay guide (for passersby) ---
            if (mode === "main") {
                let guideDelay = 1500; // delay after main visuals begin
                if (firstMainTextTime === 0) return;
                let t = millis() - firstMainTextTime - guideDelay;

                if (t > 0) {
                    let fade = constrain(t / 1500, 0, 1);
                    let guideAlpha = 180 * fade;

                    push();
                    textAlign(CENTER, CENTER);
                    textStyle(NORMAL);

                    // title / concept
                    fill(220, 230, 255, guideAlpha);
                    textSize(20);
                    text("ここに流れる言葉は、この場所に来て、残していった「誰かの思い出」です", width * 0.5, height * 0.08);

                    // explanation
                    fill(230, 230, 230, guideAlpha);
                    textSize(16);
                    text("時間の中に沈み、また浮かび上がります", width * 0.5, height * 0.12);

                    // input instruction
                    fill(255, 240, 180, guideAlpha);
                    textSize(18);
                    text("ここに言葉を残すことができます", width * 0.5, height * 0.92);

                    pop();
                }
            }
        }
        // --- text generation ---
        function addRandomText() {
            let word = random(sampleWords);
            let depth = random(0.15, 0.85);
            texts.push(new FloatingText(word, null, depth));
            if (mode === "main" && firstMainTextTime === 0 && texts.length >= 3) {
                firstMainTextTime = millis();
            }
        }

        // --- memory replay ---
        function replayFromLog() {
            if (inputHistory.length === 0) return;

            // weighted + age-biased selection
            let total = 0;
            let weighted = inputHistory.map(e => {
                let age = millis() - e.time;
                let ageFactor = pow(constrain(age / 30000, 0, 1), 1.2);
                let w = (e.weight || 1) * (0.5 + ageFactor);
                total += w;
                return { entry: e, w };
            });

            let r = random(total);
            let acc = 0;
            let log = weighted[0].entry;
            for (let item of weighted) {
                acc += item.w;
                if (r <= acc) {
                    log = item.entry;
                    break;
                }
            }

            let age = millis() - log.time;

            if (age < 2500) return;

            // 最大30秒で奥に沈む
            let ageNorm = constrain(age / 30000, 0, 1);
            let depth = constrain(pow(ageNorm, 1.3), 0, 1);

            let col = age < 5000 ? "#ffffff" : "#aaaaff";

            let processed = memoryTransform(log.text);

            let count = (random() < 0.3) ? floor(random(2, 4)) : 1;
            for (let i = 0; i < count; i++) {
                texts.push(new FloatingText(
                    processed,
                    col,
                    constrain(depth + random(-0.05, 0.05), 0, 1),
                    log.weight || 1
                ));
            }
            if (mode === "main" && firstMainTextTime === 0 && texts.length >= 3) {
                firstMainTextTime = millis();
            }
        }

        // 外部入力用（後でAPIから呼べる）
        // --- external input API ---
        function addText(str) {
            if (!str || typeof str !== "string") return;
            str = str.trim().replace(/\s+/g, " ").slice(0, 40);
            if (!str) return;
            // check if same text exists and increase weight
            let existing = inputHistory.find(e => e.text === str);
            if (existing) {
                existing.weight = (existing.weight || 1) + 1;
                existing.time = millis();
            } else {
                inputHistory.push({
                    text: str,
                    time: millis(),
                    weight: 1
                });
            }

            let processed = poeticTransform(str);
            texts.push(new FloatingText(processed, "#ffff66", null, 1));
        }

        function mousePressed() {
            if (audioCtx && audioCtx.state === "suspended") {
                audioCtx.resume().then(() => {
                    if (!introSoundPlayed && mode === "intro") {
                        playIntroSound();
                        introSoundPlayed = true;
                    }
                });
            }
        }

        function windowResized() {
            // avoid excessive resize calls (some browsers fire repeatedly)
            if (width !== windowWidth || height !== windowHeight) {
                resizeCanvas(windowWidth, windowHeight);
                background(0);
            }
        }

    </script>
</body>

</html>
