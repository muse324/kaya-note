<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>ことばを残す</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 12px;
            margin: 0;
            background: #111;
            color: #fff;
            box-sizing: border-box;
        }

        textarea {
            width: 100%;
            height: 140px;
            font-size: 22px;
            line-height: 1.5;
            padding: 12px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 16px;
            font-size: 22px;
            margin-top: 12px;
            box-sizing: border-box;
        }

        h2 {
            font-size: 26px;
            margin: 8px 0 12px 0;
        }
    </style>
</head>

<body>

    <h2>ちいとま・のおと</h2>
    <p>きょう、ここにきました。</p>
    <p>15文字ぐらいまでの短いメッセージを入れてください。記帳ノート、試し書きのつもりでお気軽に🥰</p>

    <textarea id="input"></textarea>
    <button onclick="send()">送信</button>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbycfPF2m6Z2NTovwoEcmZX2HWzKIxxmdMsTQ8udNu2o7pceN5UWm3fNfqMviVERqCns/exec";

        function send() {
            const text = document.getElementById("input").value.trim();
            if (!text) return;

            // fallback: 福知山駅
            const fallbackLat = 35.3009;
            const fallbackLng = 135.1206;

            function postWithLocation(lat, lng) {
                fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        text: text,
                        lat: lat,
                        lng: lng
                    })
                })
                    .then(res => {
                        if (!res.ok) {
                            throw new Error("HTTP " + res.status);
                        }
                        return res.text();
                    })
                    .then(data => {
                        console.log("GAS response:", data);
                        alert("送信しました");
                        document.getElementById("input").value = "";
                    })
                    .catch(err => {
                        alert("送信失敗: " + err.message);
                        console.error(err);
                    });
            }

            // 位置情報が使えない場合は福知山駅座標を使う
            if (!navigator.geolocation) {
                postWithLocation(fallbackLat, fallbackLng);
                return;
            }

            navigator.geolocation.getCurrentPosition(position => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                postWithLocation(lat, lng);
            }, err => {
                console.warn("位置情報の取得に失敗したため、福知山駅の座標を使用します", err);
                postWithLocation(fallbackLat, fallbackLng);
            }, {
                enableHighAccuracy: false,
                timeout: 5000,
                maximumAge: 60000
            });
        }
    </script>

</body>

</html>
