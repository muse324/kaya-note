<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>ことばを残す</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 12px;
            margin: 0;
            background: #111;
            color: #fff;
            box-sizing: border-box;
        }

        textarea {
            width: 100%;
            height: 120px;
            font-size: 18px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            margin-top: 10px;
            box-sizing: border-box;
        }
    </style>
</head>

<body>

    <h2>ことばを残す</h2>

    <textarea id="input"></textarea>
    <button onclick="send()">送信</button>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzVpdOrHpe6VGZ4_m3coAIMHO8U8hpgSSuwpjZaPUdDryED1V7Ykjt-RUC0SLbQ9dRr/exec";

        function send() {
            const text = document.getElementById("input").value.trim();
            if (!text) return;

            fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ text: text })
            })
                .then(res => {
                    if (!res.ok) {
                        throw new Error("HTTP " + res.status);
                    }
                    return res.text();
                })
                .then(data => {
                    console.log("GAS response:", data);
                    alert("送信しました");
                    document.getElementById("input").value = "";
                })
                .catch(err => {
                    alert("送信失敗: " + err.message);
                    console.error(err);
                });
        }
    </script>

</body>

</html>
